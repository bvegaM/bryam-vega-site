<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1060" width="1200" height="1060" font-family="Helvetica Neue, Arial, sans-serif">
  <defs>
    <style>
      .zone { fill: #f8f8f7; stroke: #bbb; stroke-width: 1.5; stroke-dasharray: 6 4; rx: 12; }
      .comp { fill: #fff; stroke: #ddd; stroke-width: 1; rx: 8; }
      .pipe-bg { fill: #E6F1FB; stroke: #B5D4F4; stroke-width: 1.5; rx: 8; }
      .badge { rx: 4; stroke-width: 1; }
      .badge-blue { fill: #E6F1FB; stroke: #B5D4F4; }
      .badge-green { fill: #E1F5EE; stroke: #5DCAA5; }
      .badge-red { fill: #FCEBEB; stroke: #F09595; }
      .num { font-size: 10px; font-weight: 600; }
      .num-blue { fill: #185FA5; }
      .num-coral { fill: #993C1D; }
      .num-green { fill: #0F6E56; }
      .num-bg-blue { fill: #E6F1FB; stroke: #B5D4F4; stroke-width: 1; }
      .num-bg-coral { fill: #FAECE7; stroke: #D85A30; stroke-width: 1; }
      .num-bg-green { fill: #E1F5EE; stroke: #5DCAA5; stroke-width: 1; }
      .title { font-size: 13px; font-weight: 600; fill: #1a1a1a; }
      .sub { font-size: 11px; fill: #666; }
      .tech { font-size: 10px; font-weight: 600; fill: #185FA5; }
      .zone-label { font-size: 11px; font-weight: 600; fill: #666; letter-spacing: 0.5px; }
      .arrow-label { font-size: 12px; fill: #999; text-anchor: middle; }
      .pipe-title { font-size: 12px; font-weight: 600; fill: #185FA5; }
      .step { font-size: 10px; font-weight: 600; fill: #185FA5; }
      .step-pass { font-size: 10px; font-weight: 600; fill: #0F6E56; }
      .step-fail { font-size: 10px; font-weight: 600; fill: #A32D2D; }
      .feedback { font-size: 11px; fill: #888; }
      .legend { font-size: 10px; fill: #888; }
    </style>
  </defs>

  <!-- ================================================ -->
  <!-- ZONE 1: Governance Foundation -->
  <!-- ================================================ -->
  <rect class="zone" x="30" y="20" width="1140" height="120"/>
  <rect fill="#fff" x="85" y="8" width="210" height="18" rx="2"/>
  <text class="zone-label" x="95" y="21">GOVERNANCE FOUNDATION</text>

  <rect class="comp" x="55" y="42" width="535" height="85"/>
  <circle class="num-bg-blue" cx="80" cy="68" r="11"/>
  <text class="num num-blue" x="80" y="72" text-anchor="middle">0</text>
  <text class="title" x="100" y="72">Governance rules</text>
  <text class="sub" x="72" y="94">Central standards, naming conventions,</text>
  <text class="sub" x="72" y="110">versioning policy, required headers</text>
  <rect class="badge badge-blue" x="430" y="66" width="130" height="20" rx="4"/>
  <text class="tech" x="442" y="80">Spectral ruleset (.yaml)</text>

  <rect class="comp" x="610" y="42" width="540" height="85"/>
  <text class="title" x="636" y="72">⎇  Rules repository</text>
  <text class="sub" x="636" y="94">Shared across all team pipelines.</text>
  <text class="sub" x="636" y="110">Single source of truth for API standards</text>
  <rect class="badge badge-blue" x="1050" y="66" width="68" height="20" rx="4"/>
  <text class="tech" x="1062" y="80">GitLab</text>

  <!-- Arrow -->
  <text class="arrow-label" x="600" y="165">↓  inherits</text>

  <!-- ================================================ -->
  <!-- ZONE 2: Contract Authoring -->
  <!-- ================================================ -->
  <rect class="zone" x="30" y="180" width="1140" height="120"/>
  <rect fill="#fff" x="85" y="168" width="170" height="18" rx="2"/>
  <text class="zone-label" x="95" y="181">CONTRACT AUTHORING</text>

  <rect class="comp" x="55" y="202" width="535" height="85"/>
  <circle class="num-bg-blue" cx="80" cy="228" r="11"/>
  <text class="num num-blue" x="80" y="232" text-anchor="middle">1</text>
  <text class="title" x="100" y="232">Spec-driven + AI</text>
  <text class="sub" x="72" y="254">Requirements + tasks → AI draft → human review</text>
  <text class="sub" x="72" y="270">→ validated OpenAPI contract</text>
  <rect class="badge badge-blue" x="440" y="226" width="95" height="20" rx="4"/>
  <text class="tech" x="452" y="240">Claude + SDD</text>

  <rect class="comp" x="610" y="202" width="540" height="85"/>
  <circle class="num-bg-blue" cx="635" cy="228" r="11"/>
  <text class="num num-blue" x="635" y="232" text-anchor="middle">2</text>
  <text class="title" x="655" y="232">Change proposal</text>
  <text class="sub" x="630" y="254">Merge request to contract repo.</text>
  <text class="sub" x="630" y="270">Diff against baseline on target branch</text>
  <rect class="badge badge-blue" x="1050" y="226" width="78" height="20" rx="4"/>
  <text class="tech" x="1062" y="240">GitLab MR</text>

  <!-- Arrow (large) -->
  <text class="arrow-label" x="600" y="332">↓  triggers MR pipeline</text>

  <!-- ================================================ -->
  <!-- ZONE 3: Quality Gates -->
  <!-- ================================================ -->
  <rect class="zone" x="30" y="350" width="1140" height="105"/>
  <rect fill="#fff" x="85" y="338" width="330" height="18" rx="2"/>
  <text class="zone-label" x="95" y="351">QUALITY GATES — MERGE REQUEST PIPELINE</text>

  <rect class="pipe-bg" x="55" y="372" width="1095" height="65"/>
  <text class="pipe-title" x="80" y="396">▶  CI pipeline (automated)</text>

  <rect class="badge badge-blue" x="80" y="406" width="108" height="22" rx="4"/>
  <circle class="num-bg-blue" cx="96" cy="417" r="8"/>
  <text class="num num-blue" x="96" y="421" text-anchor="middle">3</text>
  <text class="step" x="110" y="421">Spectral lint</text>

  <text class="sub" x="200" y="421">→</text>

  <rect class="badge badge-blue" x="220" y="406" width="155" height="22" rx="4"/>
  <text class="step" x="236" y="421">OASDiff compatibility</text>

  <text class="sub" x="388" y="421">→</text>

  <rect class="badge badge-green" x="408" y="406" width="120" height="22" rx="4"/>
  <text class="step-pass" x="424" y="421">✓  Pass → merge</text>

  <rect class="badge badge-red" x="545" y="406" width="125" height="22" rx="4"/>
  <text class="step-fail" x="561" y="421">✕  Fail → block MR</text>

  <!-- Arrow (large) -->
  <text class="arrow-label" x="600" y="490">↓  merged to main → triggers delivery pipeline</text>

  <!-- ================================================ -->
  <!-- ZONE 4: Automated Delivery -->
  <!-- ================================================ -->
  <rect class="zone" x="30" y="508" width="1140" height="130"/>
  <rect fill="#fff" x="85" y="496" width="345" height="18" rx="2"/>
  <text class="zone-label" x="95" y="509">AUTOMATED DELIVERY — MAIN BRANCH PIPELINE</text>

  <rect class="comp" x="55" y="530" width="350" height="92"/>
  <circle class="num-bg-coral" cx="80" cy="558" r="11"/>
  <text class="num num-coral" x="80" y="562" text-anchor="middle">4</text>
  <text class="title" x="100" y="562">Documentation</text>
  <text class="sub" x="72" y="584">Auto-publish API docs from</text>
  <text class="sub" x="72" y="600">validated contract</text>
  <rect class="badge badge-blue" x="268" y="556" width="90" height="20" rx="4"/>
  <text class="tech" x="278" y="570">SwaggerHub</text>

  <rect class="comp" x="425" y="530" width="365" height="92"/>
  <circle class="num-bg-coral" cx="450" cy="558" r="11"/>
  <text class="num num-coral" x="450" y="562" text-anchor="middle">5</text>
  <text class="title" x="470" y="562">Client generation</text>
  <text class="sub" x="442" y="584">Generate + publish immutable API</text>
  <text class="sub" x="442" y="600">client as package dependency</text>
  <rect class="badge badge-blue" x="640" y="556" width="120" height="20" rx="4"/>
  <text class="tech" x="650" y="570">OpenAPI Generator</text>

  <rect class="comp" x="810" y="530" width="340" height="92"/>
  <text class="title" x="836" y="562">⟨/⟩  Implementation</text>
  <text class="sub" x="836" y="584">API service consuming the contract</text>
  <text class="sub" x="836" y="600">as source of truth</text>
  <rect class="badge badge-blue" x="1042" y="556" width="84" height="20" rx="4"/>
  <text class="tech" x="1052" y="570">Spring Boot</text>

  <!-- Arrow -->
  <text class="arrow-label" x="600" y="670">↓  published client consumed by</text>

  <!-- ================================================ -->
  <!-- ZONE 5: Consumer Adoption -->
  <!-- ================================================ -->
  <rect class="zone" x="30" y="688" width="1140" height="130"/>
  <rect fill="#fff" x="85" y="676" width="170" height="18" rx="2"/>
  <text class="zone-label" x="95" y="689">CONSUMER ADOPTION</text>

  <rect class="comp" x="55" y="710" width="535" height="92"/>
  <circle class="num-bg-green" cx="80" cy="738" r="11"/>
  <text class="num num-green" x="80" y="742" text-anchor="middle">6</text>
  <text class="title" x="100" y="742">Consumer CI validation</text>
  <text class="sub" x="72" y="764">Downstream teams validate builds against the</text>
  <text class="sub" x="72" y="780">published contract. Breakage surfaces at build time</text>
  <rect class="badge badge-blue" x="420" y="736" width="120" height="20" rx="4"/>
  <text class="tech" x="430" y="750">Consumer pipelines</text>

  <rect class="comp" x="610" y="710" width="540" height="92"/>
  <circle class="num-bg-green" cx="635" cy="738" r="11"/>
  <text class="num num-green" x="635" y="742" text-anchor="middle">7</text>
  <text class="title" x="655" y="742">Feedback loop</text>
  <text class="sub" x="630" y="764">Runtime signals, usage patterns, and consumer friction</text>
  <text class="sub" x="630" y="780">feed back into governance. Standards evolve from evidence</text>
  <rect class="badge badge-blue" x="900" y="736" width="200" height="20" rx="4"/>
  <text class="tech" x="910" y="750">Observability + governance updates</text>

  <!-- ================================================ -->
  <!-- Feedback loop annotation -->
  <!-- ================================================ -->
  <line x1="55" y1="840" x2="55" y2="860" stroke="#bbb" stroke-width="2" stroke-dasharray="5 3"/>
  <line x1="55" y1="860" x2="80" y2="860" stroke="#bbb" stroke-width="2" stroke-dasharray="5 3"/>
  <text class="feedback" x="90" y="864">↻  Stage 7 feeds back into Stage 0 — governance rules evolve based on runtime evidence, not assumptions</text>

  <!-- ================================================ -->
  <!-- Legend -->
  <!-- ================================================ -->
  <rect class="comp" x="55" y="900" width="14" height="14"/>
  <text class="legend" x="76" y="912">Component / tool</text>

  <rect class="pipe-bg" x="200" y="900" width="14" height="14"/>
  <text class="legend" x="221" y="912">CI/CD pipeline</text>

  <rect class="zone" x="330" y="900" width="14" height="14"/>
  <text class="legend" x="351" y="912">Architecture zone</text>
</svg>
