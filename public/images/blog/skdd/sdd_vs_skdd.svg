<svg width="680" height="290" viewBox="0 0 680 290" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="220" y="20" width="240" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="340" y="40" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#444441">Does this task need</text>
  <text x="340" y="60" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#444441">business definition?</text>

  <path d="M220,48 L140,48 L140,130" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="178" y="40" text-anchor="middle" font-size="12" fill="#888780">Yes</text>

  <path d="M460,48 L540,48 L540,130" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="502" y="40" text-anchor="middle" font-size="12" fill="#888780">No</text>

  <rect x="40" y="130" width="200" height="100" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="140" y="152" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">SDD</text>
  <text x="56" y="177" dominant-baseline="central" font-size="12" fill="#534AB7">Intent unclear</text>
  <text x="56" y="195" dominant-baseline="central" font-size="12" fill="#534AB7">Stakeholders must align</text>
  <text x="56" y="213" dominant-baseline="central" font-size="12" fill="#534AB7">Specify → Plan → Implement</text>

  <rect x="440" y="130" width="200" height="100" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="540" y="152" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">SkDD</text>
  <text x="456" y="177" dominant-baseline="central" font-size="12" fill="#0F6E56">Process understood</text>
  <text x="456" y="195" dominant-baseline="central" font-size="12" fill="#0F6E56">No new decisions needed</text>
  <text x="456" y="213" dominant-baseline="central" font-size="12" fill="#0F6E56">Observe → Capture → Compose</text>

  <path d="M240,238 Q340,262 440,238" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="340" y="272" text-anchor="middle" font-size="12" fill="#888780">After SDD, ask: should this become a skill?</text>
</svg>
